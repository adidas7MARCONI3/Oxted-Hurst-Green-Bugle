bugle:
  name: "Oxted & Hurst Green Bugle"
  tagline: "Your community. Your news. Every day."
  locale: "Oxted, Surrey, UK"
  postcode_district: "RH8"

stations:
  - crs: OXT
    name: Oxted
  - crs: HGS
    name: Hurst Green

location:
  latitude: 51.2572
  longitude: -0.0043
  radius_miles: 2

roads:
  # DfT Street Manager API v3 — official UK street/road works register.
  # The key itself is read from the STREET_MANAGER_API_KEY environment variable
  # (never commit secrets); these are the query parameters for the works search.
  api_key_env: STREET_MANAGER_API_KEY
  latitude: 51.2567
  longitude: -0.0049
  radius_m: 3000  # 3 km around Oxted town centre

llm:
  model: "claude-opus-4-8"
  max_tokens: 256

output_dir: "data/output"

alerts:
  train_cooldown_minutes: 30
  bin_reminder_days_before: 1
