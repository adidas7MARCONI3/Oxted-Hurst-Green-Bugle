bugle:
  name: "Oxted & Hurst Green Bugle"
  tagline: "Your community. Your news. Every day."
  locale: "Oxted, Surrey, UK"
  postcode_district: "RH8"

stations:
  - crs: OXT
    name: Oxted
  - crs: HUR
    name: Hurst Green

location:
  latitude: 51.2572
  longitude: -0.0043
  radius_miles: 2

roads:
  # DfT Street Manager OPEN DATA — the free, public, KEYLESS register of UK
  # street/road works. No API key required. The national feed is filtered to
  # Oxted client-side (3 km radius below, or an area-name match as a fallback).
  # Override the feed URL with the STREET_MANAGER_OPEN_DATA_URL env var to pin a
  # specific dated archive file.
  open_data_url: "https://opendata.streetmanager.service.gov.uk/permit/latest.json"
  latitude: 51.2567
  longitude: -0.0049
  radius_m: 3000  # 3 km around Oxted town centre
  area_keywords: ["Oxted", "Hurst Green", "Limpsfield", "RH8"]

llm:
  model: "claude-opus-4-8"
  max_tokens: 256

output_dir: "data/output"

alerts:
  train_cooldown_minutes: 30
  bin_reminder_days_before: 1
