name: Train disruption alerts

on:
  schedule:
    # Every 5 minutes 05:00–10:00 UTC weekdays (covers 06:00–11:00 BST peak)
    - cron: "0,5,10,15,20,25,30,35,40,45,50,55 5-9 * * 1-5"
  workflow_dispatch:

jobs:
  check-trains:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for disruptions and alert
        env:
          DARWIN_API_KEY: ${{ secrets.DARWIN_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python scripts/train_check.py
